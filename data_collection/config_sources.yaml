blog:
  github_io_url: "https://karpathy.github.io"
  medium_url: "https://medium.com/@karpathy"
  mock_posts:
    - title: "The Unreasonable Effectiveness of RNNs"
      url: "https://karpathy.github.io/2015/05/21/rnn-effectiveness/"
      date: "2015-05-21"
      content: "There's something magical about Recurrent Neural Networks. I still remember when I first trained a character-level model on Shakespeare and saw it generate text that looked like English. It is a very rich model class."
    - title: "A Recipe for Training Neural Networks"
      url: "https://karpathy.github.io/2019/04/25/recipe/"
      date: "2019-04-25"
      content: "Training neural nets is a leaky abstraction. You can't just throw code at a framework and expect it to work. You have to start small: visualize the inputs, check the initial loss, overfit a single batch, and only then scale up."

papers:
  query: 'au:"Andrej Karpathy"'
  mock_papers:
    - title: "Deep Visual-Semantic Alignments for Generating Image Descriptions"
      arxiv_id: "1412.2306"
      date: "2014-12-08"
      abstract: "We present a model that generates natural language descriptions of images. It uses a Convolutional Neural Network over image regions and a Recurrent Neural Network to generate the text sentence."

