# Configuration for Karpathy Digital Twin Agent

data_collection:
  output_dir: "data/raw"
  github_repos:
    - "karpathy/nanoGPT"
    - "karpathy/micrograd"
    - "karpathy/char-rnn"
    - "karpathy/convnetjs"
    - "karpathy/arxiv-sanity-preserver"
    - "karpathy/llm.c"
    - "karpathy/nn-zero-to-hero"

rag:
  persist_dir: "storage/chroma_db"
  collection_name: "karpathy_knowledge"
  chunk_size: 512
  overlap: 50
  embedding_model: "all-MiniLM-L6-v2" # Lightweight fallback. Set to "nomic-embed-text" if preferred.
  top_k: 5
  boost_primary: 1.3

memory:
  short_term_window: 10
  db_path: "storage/sessions.db"
  episodic_collection: "episodic_memory"
  semantic_collection: "semantic_memory"
  important_collection: "important_moments"

llm:
  model_name: "gemini-2.5-flash"
  temperature: 0.7
  max_output_tokens: 2048
  top_p: 0.95
